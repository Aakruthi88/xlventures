version: "3.9"

services:
  # ──────────────────────────────────────
  # PostgreSQL database
  # ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: xlventures_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: xlventures
      POSTGRES_USER: xlventures_user
      POSTGRES_PASSWORD: xlventures_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xlventures_user -d xlventures"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────
  # ChromaDB vector store
  # ──────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: xlventures_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────
  # FastAPI backend
  # ──────────────────────────────────────
  backend:
    build:
      context: ./project/backend
      dockerfile: Dockerfile
    container_name: xlventures_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://xlventures_user:xlventures_pass@postgres:5432/xlventures
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ──────────────────────────────────────
  # React frontend (Vite dev server)
  # ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xlventures_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  chromadb_data:
